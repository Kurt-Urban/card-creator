name: Auto Tag Releases

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: major
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

jobs:
  tag:
    name: Create Version Tag
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip-tag]'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Calculate next version
        id: version
        shell: bash
        run: |
          set -e

          latest_tag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi

          version=${latest_tag#v}
          IFS='.' read -r major minor patch <<< "$version"

          bump_type="patch"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            bump_type="${{ inputs.bump }}"
          fi

          case "$bump_type" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump type: $bump_type"
              exit 1
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          next_tag="${{ steps.version.outputs.next_tag }}"
          if git rev-parse "$next_tag" >/dev/null 2>&1; then
            echo "Tag already exists: $next_tag"
            exit 0
          fi

          git tag -a "$next_tag" -m "Release $next_tag"
          git push origin "$next_tag"
