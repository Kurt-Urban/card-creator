name: Release Desktop Apps

on:
  push:
    tags:
      - "v*"
  workflow_run:
    workflows:
      - "Auto Tag Releases"
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and release (example: v0.0.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  resolve-tag:
    name: Resolve Release Tag
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag from event
        id: resolve
        shell: bash
        run: |
          set -e

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)
          if [ -z "$latest_tag" ]; then
            echo "No release tag found"
            exit 1
          fi

          echo "release_tag=$latest_tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build on ${{ matrix.os }}
    needs: resolve-tag
    if: ${{ needs.resolve-tag.outputs.release_tag != '' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
          - os: windows-latest
            target: win

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.release_tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installer
        run: pnpm run build:${{ matrix.target }}

      - name: Verify packaged standalone server (Windows)
        if: ${{ matrix.target == 'win' }}
        shell: pwsh
        run: |
          $serverPath = "dist-electron/win-unpacked/resources/standalone/server.js"
          if (-not (Test-Path $serverPath)) {
            Write-Error "Missing packaged standalone server: $serverPath"
            exit 1
          }

          $nextPaths = @(
            "dist-electron/win-unpacked/resources/standalone/node_modules/next/package.json",
            "dist-electron/win-unpacked/resources/standalone-deps/next/package.json"
          )
          $nextPnpmPaths = @(
            Get-ChildItem -Path "dist-electron/win-unpacked/resources/standalone/node_modules/.pnpm/*/node_modules/next/package.json" -ErrorAction SilentlyContinue | Select-Object -First 1,
            Get-ChildItem -Path "dist-electron/win-unpacked/resources/standalone-deps/.pnpm/*/node_modules/next/package.json" -ErrorAction SilentlyContinue | Select-Object -First 1
          )
          $hasNext = ($nextPaths | Where-Object { Test-Path $_ }).Count -gt 0 -or ($nextPnpmPaths | Where-Object { $_ }).Count -gt 0
          if (-not $hasNext) {
            Write-Error "Missing packaged Next runtime in standalone/node_modules or standalone-deps (checked flat and .pnpm layouts)"
            exit 1
          }

          $swcHelpersPaths = @(
            "dist-electron/win-unpacked/resources/standalone/node_modules/.pnpm/node_modules/@swc/helpers/package.json",
            "dist-electron/win-unpacked/resources/standalone-deps/.pnpm/node_modules/@swc/helpers/package.json"
          )
          $swcHelpersPnpmPaths = @(
            Get-ChildItem -Path "dist-electron/win-unpacked/resources/standalone/node_modules/.pnpm/*/node_modules/@swc/helpers/package.json" -ErrorAction SilentlyContinue | Select-Object -First 1,
            Get-ChildItem -Path "dist-electron/win-unpacked/resources/standalone-deps/.pnpm/*/node_modules/@swc/helpers/package.json" -ErrorAction SilentlyContinue | Select-Object -First 1
          )
          $hasSwcHelpers = ($swcHelpersPaths | Where-Object { Test-Path $_ }).Count -gt 0 -or ($swcHelpersPnpmPaths | Where-Object { $_ }).Count -gt 0
          if (-not $hasSwcHelpers) {
            Write-Error "Missing packaged SWC helpers runtime in standalone/node_modules or standalone-deps (checked flat and .pnpm layouts)"
            exit 1
          }

      - name: Verify packaged standalone server (macOS)
        if: ${{ matrix.target == 'mac' }}
        shell: bash
        run: |
          set -euo pipefail
          app_bundle=$(find dist-electron -maxdepth 2 -name "*.app" -type d | head -n 1)
          if [ -z "$app_bundle" ]; then
            echo "No .app bundle found in dist-electron"
            exit 1
          fi

          server_path="$app_bundle/Contents/Resources/standalone/server.js"
          if [ ! -f "$server_path" ]; then
            echo "Missing packaged standalone server: $server_path"
            exit 1
          fi

          next_path="$app_bundle/Contents/Resources/standalone/node_modules/next/package.json"
          next_alt_path="$app_bundle/Contents/Resources/standalone-deps/next/package.json"
          next_pnpm_path=$(find "$app_bundle/Contents/Resources/standalone/node_modules/.pnpm" -path "*/node_modules/next/package.json" -type f 2>/dev/null | head -n 1 || true)
          next_alt_pnpm_path=$(find "$app_bundle/Contents/Resources/standalone-deps/.pnpm" -path "*/node_modules/next/package.json" -type f 2>/dev/null | head -n 1 || true)
          if [ ! -f "$next_path" ] && [ ! -f "$next_alt_path" ] && [ -z "$next_pnpm_path" ] && [ -z "$next_alt_pnpm_path" ]; then
            echo "Missing packaged Next runtime in standalone/node_modules or standalone-deps (checked flat and .pnpm layouts)"
            exit 1
          fi

          swc_helpers_path="$app_bundle/Contents/Resources/standalone/node_modules/.pnpm/node_modules/@swc/helpers/package.json"
          swc_helpers_alt_path="$app_bundle/Contents/Resources/standalone-deps/.pnpm/node_modules/@swc/helpers/package.json"
          swc_helpers_pnpm_path=$(find "$app_bundle/Contents/Resources/standalone/node_modules/.pnpm" -path "*/node_modules/@swc/helpers/package.json" -type f 2>/dev/null | head -n 1 || true)
          swc_helpers_alt_pnpm_path=$(find "$app_bundle/Contents/Resources/standalone-deps/.pnpm" -path "*/node_modules/@swc/helpers/package.json" -type f 2>/dev/null | head -n 1 || true)
          if [ ! -f "$swc_helpers_path" ] && [ ! -f "$swc_helpers_alt_path" ] && [ -z "$swc_helpers_pnpm_path" ] && [ -z "$swc_helpers_alt_pnpm_path" ]; then
            echo "Missing packaged SWC helpers runtime in standalone/node_modules or standalone-deps (checked flat and .pnpm layouts)"
            exit 1
          fi

      - name: Upload macOS release assets
        if: ${{ matrix.target == 'mac' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.release_tag }}
          files: dist-electron/*.dmg
          fail_on_unmatched_files: true

      - name: Upload Windows release assets
        if: ${{ matrix.target == 'win' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.release_tag }}
          files: dist-electron/Card Creator.exe
          fail_on_unmatched_files: true

  update-readme-links:
    name: Update README Download Links
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Update README from latest release assets
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = "README.md";
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: release } = await github.rest.repos.getLatestRelease({ owner, repo });
            const assets = release.assets || [];

            const windowsAsset =
              assets.find((asset) => /setup.*\\.exe$/i.test(asset.name)) ||
              assets.find((asset) => /\\.exe$/i.test(asset.name) && !/elevate/i.test(asset.name));
            const macAsset = assets.find((asset) => /\\.dmg$/i.test(asset.name));

            const sectionLines = [
              "## Download Installers",
              "",
              `Latest release: [${release.tag_name}](${release.html_url})`,
              "",
              windowsAsset
                ? `- Windows (.exe): [${windowsAsset.name}](${windowsAsset.browser_download_url})`
                : "- Windows (.exe): Not available in latest release",
              macAsset
                ? `- macOS (.dmg): [${macAsset.name}](${macAsset.browser_download_url})`
                : "- macOS (.dmg): Not available in latest release",
              "",
              "<!-- INSTALLER_LINKS:START -->",
              `Generated from release ${release.tag_name}.`,
              "<!-- INSTALLER_LINKS:END -->",
            ];

            const nextSection = sectionLines.join("\\n");
            const readme = fs.readFileSync(path, "utf8");

            const markerStart = "<!-- DOWNLOAD_SECTION:START -->";
            const markerEnd = "<!-- DOWNLOAD_SECTION:END -->";

            let updated;
            if (readme.includes(markerStart) && readme.includes(markerEnd)) {
              const matcher = new RegExp(`${markerStart}[\\s\\S]*?${markerEnd}`, "m");
              updated = readme.replace(
                matcher,
                `${markerStart}\\n${nextSection}\\n${markerEnd}`,
              );
            } else {
              updated = `${readme.trimEnd()}\\n\\n${markerStart}\\n${nextSection}\\n${markerEnd}\\n`;
            }

            fs.writeFileSync(path, updated);

      - name: Commit README update
        run: |
          if git diff --quiet -- README.md; then
            echo "No README changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update installer download links [skip-tag]"
          git push origin HEAD:master
